////////////////////////////////////////////////////////////////////////////////
///////
///////  VAO openSMILE wrapper config: eGeMAPSv02 (frame-level LLD)
///////
///////  This file is shipped with the VAO Python package.
///////
///////  It reuses openSMILE's shipped GeMAPS/eGeMAPS include files, referenced
///////  via command-line config macros (passed by VAO):
///////
///////    -stdWaveInput     <.../config/shared/standard_wave_input.conf.inc>
///////    -gemapsCoreLld    <.../config/gemaps/v01b/GeMAPSv01b_core.lld.conf.inc>
///////    -egemapsCoreLld   <.../config/egemaps/v02/eGeMAPSv02_core.lld.conf.inc>
///////    -compare16CoreLld <.../config/compare16/ComParE_2016_core.lld.conf.inc>
///////
///////  Output:
///////    -csvoutput <file>  (per-frame CSV)
///////
///////  Timing overrides:
///////    - Hop size: 1ms (frameStep = 0.001)
///////    - Short-time window: 25ms (frameSize = 0.025)
///////
////////////////////////////////////////////////////////////////////////////////

[componentInstances:cComponentManager]
instance[dataMemory].type=cDataMemory
printLevelStats=0

;;;;;;;;;;;;;;;;;;;;;;;;;;;; main section ;;;;;;;;;;;;;;;;;;;;;;;;;;;

\{\cm[stdWaveInput{?}:path to openSMILE include standard_wave_input.conf.inc]}
\{\cm[gemapsCoreLld{?}:path to openSMILE include GeMAPSv01b_core.lld.conf.inc]}
\{\cm[egemapsCoreLld{?}:path to openSMILE include eGeMAPSv02_core.lld.conf.inc]}
\{\cm[compare16CoreLld{?}:path to openSMILE include ComParE_2016_core.lld.conf.inc]}

;;;;;;;;;;;;;;;;;;;;;;;;; override framing ;;;;;;;;;;;;;;;;;;;;;;;;;;

; Pitch-related analysis frames (keep 60ms window, but output at 1ms hop)
[gemapsv01b_frame60:cFramer]
frameStep = 0.001
writer.levelconf.isRb = 0
writer.levelconf.growDyn = 1
writer.levelconf.nT = 1000

; Short-time spectral analysis frames (force 25ms window and 1ms hop)
[gemapsv01b_frame25:cFramer]
frameSize = 0.025
frameStep = 0.001
writer.levelconf.isRb = 0
writer.levelconf.growDyn = 1
writer.levelconf.nT = 1000

; ComParE2016 analysis frames (override to match VAO timing)
[is13_frame60:cFramer]
frameStep = 0.001
writer.levelconf.isRb = 0
writer.levelconf.growDyn = 1
writer.levelconf.nT = 1000

[is13_frame25:cFramer]
frameSize = 0.025
frameStep = 0.001
writer.levelconf.isRb = 0
writer.levelconf.growDyn = 1
writer.levelconf.nT = 1000

;;;;;;;;;;;;;;;;;;;;;;;;; buffer sizing ;;;;;;;;;;;;;;;;;;;;;;;;;

; With a 1ms hop, some intermediate buffers in the shipped eGeMAPS configs
; can fill up (they were designed for ~10ms hops). Force dynamically growing
; (non-ringbuffer) destination levels for the key selector/smoother stages.

; Also: GeMAPS pitch smoothing uses frame counts (not seconds). Since we
; override the hop from 10ms -> 1ms, we must rescale buffer sizes to keep
; approximately the same temporal smoothing behaviour.

[gemapsv01b_pitchSmoothViterbi:cPitchSmootherViterbi]
bufferLength = 400

; The GeMAPS pitch stream is post-gated by an energy threshold via a
; cValbasedSelector (gemapsv01b_volmerge). With some recordings this can be too
; aggressive and zero-out pitch even when voicing is high.
; Lower the gate so it only suppresses near-silence.
[gemapsv01b_volmerge:cValbasedSelector]
threshold = 0.000001

[egemapsv02_lldSetSelectorE:cDataSelector]
writer.levelconf.isRb = 0
writer.levelconf.growDyn = 1
writer.levelconf.nT = 4000

[egemapsv02_smoE:cContourSmoother]
writer.levelconf.isRb = 0
writer.levelconf.growDyn = 1
writer.levelconf.nT = 4000

[egemapsv02_lldSetSelectorF:cDataSelector]
writer.levelconf.isRb = 0
writer.levelconf.growDyn = 1
writer.levelconf.nT = 4000

[egemapsv02_smoFnz:cContourSmoother]
writer.levelconf.isRb = 0
writer.levelconf.growDyn = 1
writer.levelconf.nT = 4000

; ComParE2016 smoother/delta stages can fill buffers at 1ms hop; ensure
; dynamically growing destination levels.
[is13_smoB:cContourSmoother]
writer.levelconf.isRb = 0
writer.levelconf.growDyn = 1
writer.levelconf.nT = 4000

[is13_spectral:cSpectral]
writer.levelconf.isRb = 0
writer.levelconf.growDyn = 1
writer.levelconf.nT = 4000

[is13_audspecRasta:cPlp]
writer.levelconf.isRb = 0
writer.levelconf.growDyn = 1
writer.levelconf.nT = 4000

[is13_mfcc:cMfcc]
writer.levelconf.isRb = 0
writer.levelconf.growDyn = 1
writer.levelconf.nT = 4000

[is13_energy:cEnergy]
writer.levelconf.isRb = 0
writer.levelconf.growDyn = 1
writer.levelconf.nT = 4000

[is13_audspecSum:cVectorOperation]
writer.levelconf.isRb = 0
writer.levelconf.growDyn = 1
writer.levelconf.nT = 4000

[is13_audspecRastaSum:cVectorOperation]
writer.levelconf.isRb = 0
writer.levelconf.growDyn = 1
writer.levelconf.nT = 4000

[is13_mzcr:cMZcr]
writer.levelconf.isRb = 0
writer.levelconf.growDyn = 1
writer.levelconf.nT = 4000

;;;;;;;;;;;;;;;;;;;;;;; collect LLDs ;;;;;;;;;;;;;;;;;;;;;;;

[componentInstances:cComponentManager]
instance[vao_lldconcat].type=cVectorConcat
instance[vao_lld_delta].type=cDeltaRegression
instance[vao_voicing_sel].type=cDataSelector
instance[vao_compare_spectral_sel].type=cDataSelector
instance[vao_formants_sel].type=cDataSelector
instance[vao_formants_smo].type=cContourSmoother
instance[vao_lldall].type=cVectorConcat
instance[vao_csvsink].type=cCsvSink

; Select a small curated set of ComParE-style spectral descriptors (moments +
; roll-off + harmonicity/sharpness) without exporting the full ComParE set.
;
; Note: We read from ComParE's already-smoothed LLD level `is13_lldB_smo`.
; This keeps feature names stable and avoids exporting other ComParE streams.
[vao_compare_spectral_sel:cDataSelector]
reader.dmLevel = is13_lldB_smo
writer.dmLevel = vao_compare_spectral
selected = pcm_fftMag_spectralRollOff25.0_sma;pcm_fftMag_spectralRollOff50.0_sma;pcm_fftMag_spectralRollOff75.0_sma;pcm_fftMag_spectralRollOff90.0_sma;pcm_fftMag_spectralCentroid_sma;pcm_fftMag_spectralEntropy_sma;pcm_fftMag_spectralVariance_sma;pcm_fftMag_spectralSkewness_sma;pcm_fftMag_spectralKurtosis_sma;pcm_fftMag_spectralSlope_sma;pcm_fftMag_psySharpness_sma;pcm_fftMag_spectralHarmonicity_sma
writer.levelconf.isRb = 0
writer.levelconf.growDyn = 1
writer.levelconf.nT = 4000

; Export F4/F5 (freq + bandwidth) from the GeMAPS LPC formant stream.
[vao_formants_sel:cDataSelector]
reader.dmLevel = gemapsv01b_formants
writer.dmLevel = vao_formants
selected = formantFreqLpc[4];formantBandwidthLpc[4];formantFreqLpc[5];formantBandwidthLpc[5]
newNames = F4frequency;F4bandwidth;F5frequency;F5bandwidth
writer.levelconf.isRb = 0
writer.levelconf.growDyn = 1
writer.levelconf.nT = 4000

[vao_formants_smo:cContourSmoother]
reader.dmLevel = vao_formants
writer.dmLevel = vao_formants_smo
nameAppend = sma3nz
copyInputName = 1
noPostEOIprocessing = 0
smaWin = 3
noZeroSma = 1
writer.levelconf.isRb = 0
writer.levelconf.growDyn = 1
writer.levelconf.nT = 4000

; eGeMAPSv02 provides two smoothed LLD subsets; concatenate them.
[vao_lldconcat:cVectorConcat]
reader.dmLevel = egemapsv02_lldsetE_smo;egemapsv02_lldsetF_smo;vao_compare_spectral;vao_formants_smo
writer.dmLevel = lld
includeSingleElementFields = 1
writer.levelconf.isRb = 0
writer.levelconf.growDyn = 1
writer.levelconf.nT = 6000

; Add deltas (derivatives) for convenience in rule-based labeling.
[vao_lld_delta:cDeltaRegression]
reader.dmLevel = lld
writer.dmLevel = lld_de
nameAppend = de
copyInputName = 1
deltawin = 2
blocksize = 1
writer.levelconf.isRb = 0
writer.levelconf.growDyn = 1
writer.levelconf.nT = 6000

; Export the Viterbi voicing probability so it's clear when F0-derived features
; are undefined vs truly 0.
[vao_voicing_sel:cDataSelector]
reader.dmLevel = gemapsv01b_logPitchRaw
writer.dmLevel = vao_voicing
selected = voicingFinalUnclipped
newNames = voicingFinalUnclipped
writer.levelconf.isRb = 0
writer.levelconf.growDyn = 1
writer.levelconf.nT = 6000

; Combine base + deltas into one output level.
[vao_lldall:cVectorConcat]
reader.dmLevel = lld;lld_de;vao_voicing
writer.dmLevel = lld_all
includeSingleElementFields = 1
writer.levelconf.isRb = 0
writer.levelconf.growDyn = 1
writer.levelconf.nT = 9000

;;;;;;;;;;;;;;;;;;;;;;; CSV output ;;;;;;;;;;;;;;;;;;;;;;;

[vao_csvsink:cCsvSink]
reader.dmLevel = lld_all
filename=\cm[csvoutput{?}:output csv file for LLD, disabled by default ?, only written if filename given]
instanceName=\cm[instname(N){unknown}:instance name]
append = \cm[appendcsv{0}:set to 1 to append to the LLD output csv file, default is not to append]
timestamp = \cm[timestampcsv{1}:set to 0 to suppress timestamp column, default is 1, i.e. to show timestamp in second column]
number = 0
printHeader = \cm[headercsv{1}:set to 0 to suppress header line with feature names, default is 1, i.e. to show header line]
errorOnNoOutput = 1
